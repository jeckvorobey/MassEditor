schema: spec-driven

context: |
  Проект: backend-only плагин Shop-Script `masseditor` для Webasyst.
  Рабочая область плагина: `wa-apps/shop/plugins/masseditor/`.
  OpenSpec-артефакты, спецификации, предложения, задачи и отчеты по изменениям ведутся на русском языке.
  Перед изменениями сверяйся с официальной документацией Webasyst/Shop-Script по теме изменения.
  Разработка ведется по TDD: сначала тест ожидаемого поведения, затем минимальная реализация и проверка.
  Backend actions должны оставаться тонкими; повторно используемая логика размещается в `lib/classes/`, модели - в `lib/models/`.
  Видимый backend-текст локализуется через `.po` и i18n-слой плагина.
  Для каждого нового или измененного пользовательского backend-текста, включая toast-уведомления, сообщения валидации и доступные подписи, обязательно проверяй полноту `ru_RU` и `en_US`, источник i18n-ключа и тест отображения согласно `interface_language`.
  SQL должен использовать безопасные API Webasyst/waModel, плейсхолдеры, приведение типов и whitelist для полей/сортировки.
  Основные capability specs: `plugin-architecture`, `product-selection`, `mass-operations`, `backend-ui-i18n`, `quality-workflow`.
  Документационные источники Webasyst/Shop-Script для сверки:
  - https://developers.webasyst.ru/docs/cookbook/plugins/
  - https://developers.webasyst.ru/docs/cookbook/basics/file-structure/
  - https://developers.webasyst.ru/docs/cookbook/plugins/plugin-settings/
  - https://developers.webasyst.ru/docs/cookbook/basics/classes/waPlugin/
  - https://developers.webasyst.ru/docs/plugin/hooks/shop

rules:
  proposal:
    - Пиши на русском языке.
    - Явно фиксируй пользовательский эффект, границы задачи и non-goals.
    - Указывай релевантные официальные документы Webasyst/Shop-Script, которые нужно проверить перед реализацией.
    - Для нового или измененного видимого backend-текста указывай оба языка, источник i18n-ключа и способ тестирования выбранного языка.
  design:
    - Для нового или измененного видимого backend-текста фиксируй путь от i18n-источника до UI и риски неполного словаря `ru_RU`/`en_US`.
  tasks:
    - Пиши на русском языке.
    - Начинай с тестов и проверок, затем переходи к реализации.
    - Разбивай работу на небольшие проверяемые шаги.
    - Для нового или измененного видимого backend-текста добавляй задачи проверки `ru_RU` и `en_US`.
  specs:
    - Пиши требования на русском языке.
    - 'Формулируй сценарии через MUST/SHALL-эквиваленты на русском: "ДОЛЖЕН", "ДОЛЖНА", "ДОЛЖНЫ".'
    - Отдельно фиксируй права доступа, CSRF, валидацию, экранирование, SQL-безопасность и отсутствие N+1 там, где это применимо.
    - Для нового или измененного видимого backend-текста фиксируй языковой контракт `ru_RU` и `en_US`, источник i18n-ключа и сценарий проверки выбранного языка.
